name: ci
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"
jobs:
  buildifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1
  test-bazel:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        bazel_version:
          - "7.x"
          - "8.x"
          - "9.x"
          - "latest"
          - "last_green"
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: |
          bazelisk build //...
          bazelisk test //...

  test-swiftpm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - run: swift build
      - run: swift test

  test-swiftpm-linux:
    runs-on: ubuntu-latest
    container: swift:6.3
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test

  test-swiftpm-linux-shimmed-path:
    runs-on: ubuntu-latest
    container: swift:6.3
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          real_swiftc="$(command -v swiftc)"
          mkdir -p .ci-bin
          printf '%s\n' '#!/usr/bin/env bash' "exec \"${real_swiftc}\" \"\$@\"" > .ci-bin/swiftc
          chmod +x .ci-bin/swiftc
          PATH="$PWD/.ci-bin:$PATH" swift build
          PATH="$PWD/.ci-bin:$PATH" swift test

  test-linux:
    runs-on: ubuntu-latest
    container: swift:6.3
    strategy:
      fail-fast: false
      matrix:
        bazel_version:
          - "7.x"
          - "8.x"
          - "9.x"
          - "latest"
          - "last_green"
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.16.0
        with:
          bazelisk-version: 1.x
      - env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: |
          bazel build //...
          bazel test //...
